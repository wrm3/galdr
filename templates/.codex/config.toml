# ---------------------------------------------------------------------------
# Agent Roles (Codex multi-agent configuration)
# ---------------------------------------------------------------------------

[agents]
max_threads = 6
max_depth = 2

[agents.task-manager]
description = "Manages galdr task lifecycle — creates, updates, completes tasks in .galdr/. Handles TASKS.md sync, task file creation, status transitions, and phase numbering."

[agents.planner]
description = "Creates and manages PRDs, phase definitions, scope validation, and project planning in .galdr/PLAN.md."

[agents.qa-engineer]
description = "Tracks bugs in .galdr/tracking/BUGS.md, classifies severity, documents fixes, and manages quality processes."

[agents.code-reviewer]
description = "Performs comprehensive code reviews covering security, performance, maintainability, and best practices."

[agents.infrastructure]
description = "Manages project file organization, folder structure, scope boundaries, and subsystem registry."

[agents.verifier]
description = "Verifies completed tasks by reviewing evidence of completion and cross-checking acceptance criteria. Never verifies tasks it implemented."
