[[skills.config]]
path = ".codex/skills/g-skl-git-commit"
enabled = true

[[skills.config]]
path = ".codex/skills/g-skl-ideas"
enabled = true

[[skills.config]]
path = ".codex/skills/g-skl-medkit"
enabled = true

[[skills.config]]
path = ".codex/skills/g-skl-plan"
enabled = true

[[skills.config]]
path = ".codex/skills/g-skl-project"
enabled = true

[[skills.config]]
path = ".codex/skills/g-skl-qa"
enabled = true

[[skills.config]]
