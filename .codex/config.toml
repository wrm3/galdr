#:schema https://developers.openai.com/codex/config-schema.json

# galdr - Codex Project Configuration
# This file configures OpenAI Codex for the galdr task management system.

model = "gpt-5-codex"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
model_reasoning_effort = "high"
personality = "pragmatic"

[windows]
sandbox = "elevated"

[sandbox_workspace_write]
network_access = true
writable_roots = []

[features]
multi_agent = true
shell_tool = true
shell_snapshot = true
undo = true

# ---------------------------------------------------------------------------
# Skills - only the 17 galdr core skills that actually exist in .codex/skills/
# ---------------------------------------------------------------------------

[[skills.config]]
path = ".codex/skills/g-skl-bugs"
enabled = true

[[skills.config]]
