name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make gald3r better? We'd love to hear it.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area would this affect?
      options:
        - New Agent
        - New Skill
        - MCP Server / Tools
        - Task Management
        - IDE Support
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like to see
      placeholder: |
        What problem does this solve?
        How would it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternatives?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples
