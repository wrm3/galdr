name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Looks for ## [VERSION] through the next ## [ line
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.txt
          # Trim leading/trailing blank lines
          sed -i '/./,$!d' release_notes.txt
          echo "Release notes extracted for v$VERSION"
          cat release_notes.txt

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Package the template directories (what users actually copy into their projects)
          zip -r "galdr-template-v${VERSION}.zip" \
            .cursor/ \
            .claude/ \
            .agent/ \
            .codex/ \
            .opencode/ \
            .galdr/ \
            AGENTS.md \
            CLAUDE.md \
            GEMINI.md \
            README.md \
            CHANGELOG.md \
            LICENSE \
            -x "*.git*" \
            -x "*__pycache__*" \
            -x "*.pyc"
          echo "Archive created: galdr-template-v${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "galdr v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          files: "galdr-template-v${{ steps.version.outputs.version }}.zip"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
