<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>galdr</title>
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="app-layout">

  <nav class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">⬡ galdr</span>
      <span class="sidebar-version">v1.0</span>
    </div>

    <div class="sidebar-section-title">Overview</div>
    <div class="nav-item" data-route="dashboard">
      <span class="nav-icon">◉</span><span class="nav-text">Dashboard</span>
    </div>
    <div class="nav-item" data-route="project">
      <span class="nav-icon">◈</span><span class="nav-text">Project</span>
    </div>

    <div class="sidebar-section-title">Operations</div>
    <div class="nav-item" data-route="tasks">
      <span class="nav-icon">☰</span><span class="nav-text">Tasks</span>
    </div>
    <div class="nav-item" data-route="heartbeat">
      <span class="nav-icon">♥</span><span class="nav-text">Heartbeat</span>
    </div>
    <div class="nav-item" data-route="schedules">
      <span class="nav-icon">⏱</span><span class="nav-text">Schedules</span>
    </div>
    <div class="nav-item" data-route="health">
      <span class="nav-icon">⚡</span><span class="nav-text">System Health</span>
    </div>

    <div class="sidebar-section-title">Data</div>
    <div class="nav-item" data-route="db">
      <span class="nav-icon">⬡</span><span class="nav-text">DB Explorer</span>
    </div>
    <div class="nav-item" data-route="vault">
      <span class="nav-icon">📚</span><span class="nav-text">Vault</span>
    </div>
    <div class="nav-item" data-route="search">
      <span class="nav-icon">🔍</span><span class="nav-text">Knowledge Search</span>
    </div>
    <div class="nav-item" data-route="sessions">
      <span class="nav-icon">👤</span><span class="nav-text">Sessions</span>
    </div>
  </nav>

  <main class="content-area">
    <div id="page-content"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script>
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "k") {
        e.preventDefault();
        location.hash = "#search";
      }
    });
  </script>
</body>
</html>
