<div class="page-vault-browser">
<style>
.page-vault-browser { display: flex; flex: 1; overflow: hidden; }
.page-vault-browser #vault-sidebar { width: 300px; border-right: 1px solid var(--border, #30363d); overflow-y: auto;
           background: var(--surface, #161b22); flex-shrink: 0; }
.page-vault-browser #vault-sidebar h2 { padding: 16px; font-size: 14px; color: var(--muted, #8b949e); border-bottom: 1px solid var(--border, #30363d); }
.page-vault-browser #vault-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.page-vault-browser #vault-toolbar { padding: 12px 16px; border-bottom: 1px solid var(--border, #30363d); display: flex; gap: 8px;
           background: var(--surface, #161b22); }
.page-vault-browser #vault-toolbar input { flex: 1; background: var(--bg, #0d1117); border: 1px solid var(--border, #30363d); color: var(--text, #e6edf3);
                 padding: 8px 12px; border-radius: 6px; font-size: 14px; }
.page-vault-browser #vault-toolbar select { background: var(--bg, #0d1117); border: 1px solid var(--border, #30363d); color: var(--text, #e6edf3);
                  padding: 8px; border-radius: 6px; }
.page-vault-browser #vault-toolbar button { background: var(--accent, #58a6ff); color: #fff; border: none; padding: 8px 16px;
                  border-radius: 6px; cursor: pointer; font-weight: 600; }
.page-vault-browser #vault-content { flex: 1; overflow-y: auto; padding: 24px; }
.page-vault-browser .tree-folder { cursor: pointer; padding: 4px 8px; color: var(--muted, #8b949e); font-size: 13px; }
.page-vault-browser .tree-folder:hover { color: var(--accent, #58a6ff); }
.page-vault-browser .tree-file { padding: 4px 8px 4px 24px; cursor: pointer; font-size: 13px; white-space: nowrap;
             overflow: hidden; text-overflow: ellipsis; }
.page-vault-browser .tree-file:hover { background: var(--bg, #0d1117); color: var(--accent, #58a6ff); }
.page-vault-browser .note-title { font-size: 24px; margin-bottom: 8px; }
.page-vault-browser .note-meta { color: var(--muted, #8b949e); font-size: 13px; margin-bottom: 16px; }
.page-vault-browser .note-meta span { margin-right: 12px; }
.page-vault-browser .tag { display: inline-block; background: #1f6feb33; color: var(--accent, #58a6ff); padding: 2px 8px;
       border-radius: 12px; font-size: 12px; margin-right: 4px; }
.page-vault-browser .note-body { line-height: 1.7; white-space: pre-wrap; font-family: monospace; font-size: 14px; }
.page-vault-browser .search-result { padding: 12px; border: 1px solid var(--border, #30363d); border-radius: 8px;
                 margin-bottom: 8px; cursor: pointer; }
.page-vault-browser .search-result:hover { border-color: var(--accent, #58a6ff); }
.page-vault-browser .search-result h3 { font-size: 15px; margin-bottom: 4px; }
.page-vault-browser .search-result .snippet { color: var(--muted, #8b949e); font-size: 13px; }
.page-vault-browser .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.page-vault-browser .stat-card { background: var(--surface, #161b22); border: 1px solid var(--border, #30363d); border-radius: 8px;
             padding: 16px; text-align: center; }
.page-vault-browser .stat-card .number { font-size: 32px; font-weight: bold; color: var(--accent, #58a6ff); }
.page-vault-browser .stat-card .label { color: var(--muted, #8b949e); font-size: 13px; margin-top: 4px; }
.page-vault-browser .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border, #30363d); background: var(--surface, #161b22); }
.page-vault-browser .tab { padding: 10px 20px; cursor: pointer; color: var(--muted, #8b949e); border-bottom: 2px solid transparent;
       font-size: 14px; }
.page-vault-browser .tab:hover { color: var(--text, #e6edf3); }
.page-vault-browser .tab.active { color: var(--accent, #58a6ff); border-bottom-color: var(--accent, #58a6ff); }
</style>

<div id="vault-sidebar">
  <h2>VAULT EXPLORER</h2>
  <div id="vault-tree">Loading...</div>
</div>
<div id="vault-main">
  <div class="tab-bar">
    <div class="tab active" data-tab="browse" onclick="vaultSwitchTab('browse')">Browse</div>
    <div class="tab" data-tab="search" onclick="vaultSwitchTab('search')">Search</div>
    <div class="tab" data-tab="graph" onclick="vaultSwitchTab('graph')">Graph</div>
    <div class="tab" data-tab="stats" onclick="vaultSwitchTab('stats')">Stats</div>
  </div>
  <div id="vault-toolbar">
    <input id="vault-search-input" placeholder="Search vault..." onkeydown="if(event.key==='Enter')vaultDoSearch()">
    <select id="vault-search-mode">
      <option value="keyword">Keyword</option>
      <option value="semantic">Semantic</option>
    </select>
    <button onclick="vaultDoSearch()">Search</button>
  </div>
  <div id="vault-content">Select a note from the sidebar or search.</div>
</div>

<script>
(function() {
'use strict';
let currentTab = 'browse';

window.vaultSwitchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.page-vault-browser .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'stats') loadStats();
  if (tab === 'graph') loadGraph();
  if (tab === 'browse') document.getElementById('vault-content').innerHTML = 'Select a note from the sidebar.';
  if (tab === 'search') document.getElementById('vault-content').innerHTML = 'Type a query and press Search.';
};

async function loadTree() {
  const resp = await fetch('/vault/tree');
  const data = await resp.json();
  document.getElementById('vault-tree').innerHTML = renderTree(data.tree, 0);
}

function renderTree(node, depth) {
  let html = '';
  for (const [key, val] of Object.entries(node)) {
    if (key === '_children') continue;
    if (val._children) {
      html += '<div class="tree-folder" style="padding-left:' + (8 + depth * 12) + 'px" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">' +
              '📁 ' + key + '</div><div>' + renderTree(val._children, depth + 1) + '</div>';
    } else if (val.path) {
      html += '<div class="tree-file" style="padding-left:' + (8 + depth * 12) + 'px" onclick="vaultLoadNote(\'' +
              val.path.replace(/'/g, "\\'") + '\')">' + (val.title || key) + '</div>';
    }
  }
  return html;
}

window.vaultLoadNote = async function(path) {
  vaultSwitchTab('browse');
  const resp = await fetch('/vault/note?path=' + encodeURIComponent(path));
  const note = await resp.json();
  if (note.error) { document.getElementById('vault-content').innerHTML = '<p>' + note.error + '</p>'; return; }
  let tags = (note.tags || []).map(t => '<span class="tag">' + t + '</span>').join('');
  let links = (note.links || []).map(l => '<a href="#" onclick="vaultLoadNote(\'' + l + '.md\')" style="color:var(--accent,#58a6ff)">' + l + '</a>').join(', ');
  document.getElementById('vault-content').innerHTML =
    '<h1 class="note-title">' + (note.title || path) + '</h1>' +
    '<div class="note-meta"><span>' + (note.type || '') + '</span><span>' + (note.date || '') + '</span>' + tags + '</div>' +
    (note.url ? '<div class="note-meta"><a href="' + note.url + '" target="_blank" style="color:var(--accent,#58a6ff)">' + note.url + '</a></div>' : '') +
    (links ? '<div class="note-meta">Links: ' + links + '</div>' : '') +
    '<pre class="note-body">' + escapeHtml(note.body || note.content) + '</pre>';
};

window.vaultDoSearch = async function() {
  vaultSwitchTab('search');
  const q = document.getElementById('vault-search-input').value;
  const mode = document.getElementById('vault-search-mode').value;
  if (!q) return;
  const resp = await fetch('/vault/search?q=' + encodeURIComponent(q) + '&mode=' + mode);
  const data = await resp.json();
  if (!data.results || data.results.length === 0) {
    document.getElementById('vault-content').innerHTML = '<p>No results found.</p>';
    return;
  }
  document.getElementById('vault-content').innerHTML = data.results.map(r =>
    '<div class="search-result" onclick="vaultLoadNote(\'' + r.path.replace(/'/g, "\\'") + '\')">' +
    '<h3>' + (r.title || r.path) + ' <small style="color:var(--muted,#8b949e)">(' + (r.score || 0) + ')</small></h3>' +
    '<div class="snippet">' + escapeHtml(r.snippet || '') + '</div>' +
    '<div style="margin-top:4px">' + (r.tags || []).map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' +
    '</div>'
  ).join('');
};

async function loadStats() {
  const resp = await fetch('/vault/stats');
  const s = await resp.json();
  let typeCards = Object.entries(s.by_type || {}).map(([t, c]) =>
    '<div class="stat-card"><div class="number">' + c + '</div><div class="label">' + (t || 'untyped') + '</div></div>'
  ).join('');
  document.getElementById('vault-content').innerHTML =
    '<div class="stats-grid">' +
    '<div class="stat-card"><div class="number">' + s.total_notes + '</div><div class="label">Total Notes</div></div>' +
    '<div class="stat-card"><div class="number">' + s.with_embeddings + '</div><div class="label">With Embeddings</div></div>' +
    '<div class="stat-card"><div class="number">' + s.with_links + '</div><div class="label">With Links</div></div>' +
    typeCards + '</div>';
}

async function loadGraph() {
  const resp = await fetch('/vault/graph');
  const data = await resp.json();
  let html = '<div style="padding:16px"><h2>Knowledge Graph</h2><p style="color:var(--muted,#8b949e)">' +
    data.node_count + ' nodes, ' + data.edge_count + ' edges</p>' +
    '<div style="margin-top:16px">';
  const typeColors = { video_summary: 'var(--green,#3fb950)', harvest: 'var(--orange,#d29922)', research: 'var(--accent,#58a6ff)', platform_docs: '#bc8cff' };
  for (const node of data.nodes.slice(0, 200)) {
    const color = typeColors[node.type] || 'var(--muted,#8b949e)';
    html += '<span style="display:inline-block;margin:4px;padding:4px 10px;border:1px solid ' + color +
      ';border-radius:16px;font-size:12px;color:' + color + ';cursor:pointer" onclick="vaultLoadNote(\'' +
      node.id.replace(/'/g, "\\'") + '\')">' + node.label + '</span>';
  }
  html += '</div></div>';
  document.getElementById('vault-content').innerHTML = html;
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

window.pageInit = loadTree;
loadTree();
})();
</script>
</div>
