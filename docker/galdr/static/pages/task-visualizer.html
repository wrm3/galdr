<div class="page-task-visualizer">
<style>
.page-task-visualizer header{background:#1e293b;padding:10px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #334155;flex-shrink:0}
.page-task-visualizer header h1{font-size:14px;color:#a78bfa;font-weight:600}
.page-task-visualizer #viz-st{font-size:11px;color:#64748b}
.page-task-visualizer .toolbar{display:flex;gap:8px;padding:6px 12px;background:#1e293b;border-bottom:1px solid #334155;flex-shrink:0;align-items:center;font-size:11px}
.page-task-visualizer .btn{background:#1e40af;color:#e2e8f0;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px;font-family:monospace}
.page-task-visualizer .btn:hover{background:#1d4ed8}
.page-task-visualizer .btn.active{background:#5b21b6}
.page-task-visualizer .main{display:flex;flex:1;overflow:hidden}
.page-task-visualizer #viz-canvas{flex:1;overflow:auto;position:relative;padding:16px}
.page-task-visualizer .sidebar{width:220px;background:#1e293b;border-left:1px solid #334155;overflow-y:auto;flex-shrink:0;font-size:11px}
.page-task-visualizer .sidebar h2{padding:8px 12px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #334155}
.page-task-visualizer #viz-detail{padding:10px 12px;white-space:pre-wrap;color:#94a3b8;font-size:10px}
.page-task-visualizer .phase-lane{background:#0d1526;border:1px solid #1e3a5f;border-radius:6px;padding:10px 14px;margin-bottom:16px}
.page-task-visualizer .phase-title{font-size:11px;font-weight:600;color:#38bdf8;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1e3a5f}
.page-task-visualizer .nodes-grid{display:flex;flex-wrap:wrap;gap:8px}
.page-task-visualizer .node{border-radius:4px;padding:6px 10px;cursor:pointer;border:1px solid transparent;min-width:140px;max-width:200px;font-size:11px;transition:border-color .15s;position:relative}
.page-task-visualizer .node:hover{border-color:#64748b}
.page-task-visualizer .node.selected{border-color:#a78bfa;box-shadow:0 0 0 1px #a78bfa}
.page-task-visualizer .node-id{font-size:9px;color:#64748b;margin-bottom:2px}
.page-task-visualizer .node-title{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-task-visualizer .node-badges{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap}
.page-task-visualizer .badge{font-size:8px;padding:1px 4px;border-radius:2px}
.page-task-visualizer .s-completed{background:#052e16;border-color:#166534;color:#86efac}
.page-task-visualizer .s-in-progress{background:#0c1a4a;border-color:#1e40af;color:#93c5fd}
.page-task-visualizer .s-awaiting-verification{background:#1a0d4a;border-color:#5b21b6;color:#ddd6fe}
.page-task-visualizer .s-pending{background:#0f172a;border-color:#334155;color:#94a3b8}
.page-task-visualizer .s-failed{background:#2d0505;border-color:#7f1d1d;color:#fca5a5}
.page-task-visualizer .s-ghost{background:#0c0f16;border-color:#1e293b;color:#475569;border-style:dashed}
.page-task-visualizer .s-archived{background:#1a1209;border-color:#78350f;color:#fcd34d;opacity:.75}
.page-task-visualizer .p-critical{background:#7f1d1d;color:#fca5a5}
.page-task-visualizer .p-high{background:#431407;color:#fdba74}
.page-task-visualizer .p-medium{background:#0c2a1a;color:#86efac}
.page-task-visualizer .p-low{background:#1e293b;color:#64748b}
.page-task-visualizer .archived-badge{background:#78350f;color:#fcd34d}
.page-task-visualizer .legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-left:auto;font-size:10px}
.page-task-visualizer .l-item{display:flex;align-items:center;gap:4px}
.page-task-visualizer .l-dot{width:8px;height:8px;border-radius:2px}
</style>

<header>
  <h1>&#9670; galdr task Visualizer</h1>
  <span id="viz-st">loading…</span>
  <div class="legend">
    <div class="l-item"><div class="l-dot s-completed"></div>done</div>
    <div class="l-item"><div class="l-dot s-in-progress"></div>active</div>
    <div class="l-item"><div class="l-dot s-awaiting-verification"></div>verify</div>
    <div class="l-item"><div class="l-dot s-pending"></div>pending</div>
    <div class="l-item"><div class="l-dot s-failed"></div>failed</div>
    <div class="l-item"><div class="l-dot s-archived" style="opacity:1"></div>archived</div>
    <div class="l-item"><div class="l-dot s-ghost"></div>ghost</div>
  </div>
</header>
<div class="toolbar">
  <button class="btn active" id="viz-btn-phase" onclick="vizSetView('phase')">Phase Swimlanes</button>
  <button class="btn" id="viz-btn-flat" onclick="vizSetView('flat')">Flat List</button>
  <button class="btn" onclick="vizLoad()">↻ Refresh</button>
  <span style="margin-left:auto;color:#475569">Click a task node for details</span>
</div>
<div class="main">
  <div id="viz-canvas"><div style="padding:24px;color:#334155">Loading task data…</div></div>
  <div class="sidebar">
    <h2>Task Detail</h2>
    <div id="viz-detail">Select a node</div>
  </div>
</div>

<script>
(function() {
'use strict';
let data=null,view='phase',selected=null;

async function load(){
  try{
    const r=await fetch('/admin/galdr/data');
    data=await r.json();
    document.getElementById('viz-st').textContent=data.nodes.length+' tasks · '+data.phases.length+' phases';
    render();
  }catch(e){
    document.getElementById('viz-st').textContent='Error: '+e.message;
    document.getElementById('viz-canvas').innerHTML='<div style="padding:24px;color:#f87171">'+e.message+'</div>';
  }
}

window.vizLoad = load;

window.vizSetView = function(v){
  view=v;
  document.getElementById('viz-btn-phase').classList.toggle('active',v==='phase');
  document.getElementById('viz-btn-flat').classList.toggle('active',v==='flat');
  render();
};

function statusClass(s){
  const m={'completed':'s-completed','in-progress':'s-in-progress','in_progress':'s-in-progress',
    'awaiting-verification':'s-awaiting-verification','awaiting_verification':'s-awaiting-verification',
    'pending':'s-pending','failed':'s-failed','ghost':'s-ghost','archived':'s-archived'};
  return m[s]||'s-pending';
}

function statusEmoji(s){
  const m={completed:'✅','in-progress':'🔄','in_progress':'🔄','awaiting-verification':'🔍',
    'awaiting_verification':'🔍',pending:'📋',failed:'❌',ghost:'👻',archived:'📦'};
  return m[s]||'📋';
}

function nodeHtml(n){
  const sc=statusClass(n.status)+(n.archived?' s-archived':'');
  const pc=n.priority?'<span class="badge p-'+n.priority+'">'+n.priority+'</span>':'';
  const br=n.blast_radius&&n.blast_radius!=='low'?'<span class="badge" style="background:#4c1d95;color:#ddd6fe">'+n.blast_radius+'</span>':'';
  const ar=n.archived?'<span class="badge archived-badge">📦 archived</span>':'';
  const sel=selected===n.id?' selected':'';
  return '<div class="node '+sc+sel+'" id="viz-nd-'+n.id+'" onclick="vizSelectNode(\''+n.id+'\')">'+
    '<div class="node-id">#'+n.id+'</div>'+
    '<div class="node-title" title="'+escHtml(n.title)+'">'+statusEmoji(n.status)+' '+escHtml(n.title||'').slice(0,40)+'</div>'+
    '<div class="node-badges">'+pc+br+ar+'</div>'+
  '</div>';
}

function render(){
  if(!data)return;
  const canvas=document.getElementById('viz-canvas');
  if(view==='phase'){
    const byPhase={};
    data.nodes.forEach(n=>{
      const ph=n.phase!=null?n.phase:'?';
      if(!byPhase[ph])byPhase[ph]=[];
      byPhase[ph].push(n);
    });
    const phases=Object.keys(byPhase).sort((a,b)=>Number(a)-Number(b));
    canvas.innerHTML=phases.map(ph=>{
      const pname=(data.phases.find(p=>String(p.phase)===String(ph))||{}).name||'';
      const nodes=byPhase[ph].map(nodeHtml).join('');
      const total=byPhase[ph].length;
      const done=byPhase[ph].filter(n=>n.status==='completed'||n.archived).length;
      return '<div class="phase-lane">'+
        '<div class="phase-title">Phase '+ph+': '+escHtml(pname)+' ('+done+'/'+total+')</div>'+
        '<div class="nodes-grid">'+nodes+'</div>'+
      '</div>';
    }).join('');
  } else {
    const nodes=data.nodes.map(nodeHtml).join('');
    canvas.innerHTML='<div class="nodes-grid">'+nodes+'</div>';
  }
}

window.vizSelectNode = async function(id){
  selected=id;
  render();
  const det=document.getElementById('viz-detail');
  det.textContent='Loading…';
  try{
    const r=await fetch('/admin/galdr/task/'+encodeURIComponent(id));
    const d=await r.json();
    if(d.error){det.textContent=d.error;return;}
    let out='ID: '+d.id+'\nTitle: '+d.title+'\nStatus: '+d.status+'\nPriority: '+(d.priority||'—')+'\nPhase: '+(d.phase||'—')+'\nBlast: '+(d.blast_radius||'—')+'\nFile: '+(d.file||'—')+'\n';
    if(d.dependencies&&d.dependencies.length)out+='\nDeps: '+d.dependencies.join(', ');
    if(d.subsystems&&d.subsystems.length)out+='\nSubsystems: '+d.subsystems.join(', ');
    if(d.project_context)out+='\n\nContext:\n'+d.project_context;
    det.textContent=out;
  }catch(e){det.textContent=e.message;}
};

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

window.pageInit = load;
load();
})();
</script>
</div>
