<div class="page-project-tasks">
<style>
.page-project-tasks { padding: 20px; }
.page-project-tasks h1 { color: #a78bfa; font-size: 16px; margin-bottom: 16px; }
.page-project-tasks .input-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
.page-project-tasks .input-bar label { color: #64748b; font-size: 12px; }
.page-project-tasks .input-bar input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 6px 12px;
  border-radius: 4px; font-family: monospace; font-size: 13px; width: 300px; }
.page-project-tasks .input-bar button { background: #1e40af; color: #e2e8f0; border: none; padding: 6px 14px;
  border-radius: 3px; cursor: pointer; font-size: 12px; font-family: monospace; }
.page-project-tasks .input-bar button:hover { background: #1d4ed8; }
.page-project-tasks .meta { color: #64748b; font-size: 11px; margin-bottom: 20px; }
.page-project-tasks .meta a { color: #38bdf8; text-decoration: none; }
.page-project-tasks .meta a:hover { text-decoration: underline; }
.page-project-tasks .task { background: #1e293b; border: 1px solid #334155; border-radius: 4px; padding: 10px 14px; margin-bottom: 8px; }
.page-project-tasks .task-id { color: #64748b; font-size: 10px; }
.page-project-tasks .task-title { color: #e2e8f0; font-size: 12px; margin: 3px 0; }
.page-project-tasks .task-status { font-size: 10px; padding: 1px 6px; border-radius: 2px; display: inline-block; }
.page-project-tasks .s-completed { background: #052e16; color: #86efac; }
.page-project-tasks .s-pending { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
.page-project-tasks .s-in-progress, .page-project-tasks .s-in_progress { background: #0c1a4a; color: #93c5fd; }
.page-project-tasks .s-failed { background: #2d0505; color: #fca5a5; }
.page-project-tasks .empty { color: #334155; padding: 40px; text-align: center; }
</style>

<h1>&#9670; Project Tasks</h1>
<div class="input-bar">
  <label>Project ID:</label>
  <input id="pt-project-id" type="text" placeholder="Enter project_id…"
    onkeydown="if(event.key==='Enter')ptLoad()">
  <button onclick="ptLoad()">Load Tasks</button>
</div>
<div class="meta" id="pt-meta"></div>
<div id="pt-list"><div class="empty">Enter a project_id above and click Load Tasks</div></div>

<script>
(function() {
'use strict';

window.ptLoad = async function() {
  const pid = document.getElementById('pt-project-id').value.trim();
  if (!pid) return;
  const container = document.getElementById('pt-list');
  const meta = document.getElementById('pt-meta');
  container.innerHTML = '<div class="empty">Loading…</div>';
  meta.innerHTML = 'Project: ' + pid + ' · <a href="#" onclick="event.preventDefault();window.location.hash=\'task-visualizer\'">Full Visualizer</a>';

  try {
    const r = await fetch('/projects/' + encodeURIComponent(pid) + '/tasks/data');
    const d = await r.json();
    if (!d.tasks || !d.tasks.length) {
      container.innerHTML = '<div class="empty">No tasks synced yet</div>';
      return;
    }
    container.innerHTML = d.tasks.map(t => {
      const sc = 's-' + (t.status || 'pending').replace(/ /g, '-');
      return '<div class="task"><span class="task-id">#' + (t.id || '?') + '</span>' +
        '<div class="task-title">' + (t.title || t.path || 'Untitled') + '</div>' +
        '<span class="task-status ' + sc + '">' + (t.status || 'pending') + '</span></div>';
    }).join('');
  } catch (e) {
    container.innerHTML = '<div class="empty" style="color:#f87171">' + e.message + '</div>';
  }
};

window.pageInit = function() {};
})();
</script>
</div>
