<!-- galdr project dashboard — phase progress, tasks, bugs -->

<style>
  .proj-phases {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .proj-phase-card {
    flex: 1 1 220px;
    max-width: 340px;
    padding: 14px;
    background: var(--bg-base);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    border-left: 3px solid transparent;
    transition: border-color .2s;
  }
  .proj-phase-card.active {
    border-left-color: var(--accent);
    background: rgba(56, 189, 248, .03);
  }
  .proj-phase-num {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .proj-phase-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .proj-phase-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .proj-filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .proj-filters select {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    background: var(--bg-elevated);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
  }
  .proj-filters select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .proj-sortable { cursor: pointer; user-select: none; }
  .proj-sortable:hover { color: var(--accent); }
  .proj-sort-arrow { font-size: 9px; margin-left: 3px; }
  .proj-bug-sev-row {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }
  .proj-bug-sev-item {
    text-align: center;
  }
  .proj-bug-sev-item .count {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }
  .proj-bug-sev-item .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-muted);
  }
</style>

<div class="page-header">
  <h1>Project Dashboard</h1>
  <span class="subtitle" id="proj-subtitle">Loading…</span>
</div>

<div style="padding: 20px 24px; display: flex; flex-direction: column; gap: 20px;">

  <!-- Phase progress -->
  <div class="card">
    <div class="card-header">Phase Progress</div>
    <div class="card-body">
      <div class="proj-phases" id="proj-phases">
        <div class="empty-state"><span class="icon">⏳</span><span>Loading…</span></div>
      </div>
    </div>
  </div>

  <!-- Task breakdown stats -->
  <div class="grid-3" id="proj-stats">
    <div class="card"><div class="card-body stat"><div class="stat-value" id="proj-total">—</div><div class="stat-label">Total Tasks</div></div></div>
    <div class="card"><div class="card-body stat"><div class="stat-value text-green" id="proj-completed">—</div><div class="stat-label">Completed</div></div></div>
    <div class="card"><div class="card-body stat"><div class="stat-value text-accent" id="proj-inprogress">—</div><div class="stat-label">In Progress</div></div></div>
  </div>

  <!-- Task table -->
  <div class="card">
    <div class="card-header">Tasks</div>
    <div class="card-body" style="padding: 12px 16px 0;">
      <div class="proj-filters">
        <select id="proj-filter-phase"><option value="">All Phases</option></select>
        <select id="proj-filter-status"><option value="">All Statuses</option></select>
      </div>
    </div>
    <div style="overflow: auto; max-height: 420px;">
      <table id="proj-task-table">
        <thead>
          <tr>
            <th class="proj-sortable" data-col="id">ID<span class="proj-sort-arrow"></span></th>
            <th class="proj-sortable" data-col="title">Title<span class="proj-sort-arrow"></span></th>
            <th class="proj-sortable" data-col="status">Status<span class="proj-sort-arrow"></span></th>
            <th class="proj-sortable" data-col="phase">Phase<span class="proj-sort-arrow"></span></th>
            <th class="proj-sortable" data-col="priority">Priority<span class="proj-sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="proj-task-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Bug summary -->
  <div class="card">
    <div class="card-header">Bug Summary</div>
    <div class="card-body">
      <div class="proj-bug-sev-row" id="proj-bug-sev"></div>
      <div id="proj-bug-recent"></div>
    </div>
  </div>

</div>

<script>
window.pageInit = async function () {
  const $ = (id) => document.getElementById(id);

  let data;
  try {
    data = await api("/api/status/health");
  } catch (err) {
    $("proj-subtitle").textContent = "Failed to load: " + err.message;
    return;
  }

  $("proj-subtitle").textContent = data.project_name || "Project overview";

  // ── Phase cards ──────────────────────────────────
  const phases = data.phases || [];
  if (phases.length === 0) {
    $("proj-phases").innerHTML = '<div class="empty-state"><span class="icon">∅</span><span>No phases defined</span></div>';
  } else {
    const maxPhase = Math.max(...phases.map(p => p.in_progress || 0));
    $("proj-phases").innerHTML = phases.map(function (p) {
      const total = p.total || 0;
      const done = p.completed || 0;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const isActive = (p.in_progress || 0) > 0 || (p.completed || 0) < (p.total || 0) && phases.indexOf(p) === phases.findIndex(x => (x.completed || 0) < (x.total || 1));
      return '<div class="proj-phase-card' + (isActive ? ' active' : '') + '">' +
        '<div class="proj-phase-num">Phase ' + escHtml(p.number) + '</div>' +
        '<div class="proj-phase-name">' + escHtml(p.name || 'Unnamed') + '</div>' +
        '<div class="proj-phase-meta"><span>' + done + ' / ' + total + ' tasks</span><span>' + pct + '%</span></div>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '</div>';
    }).join("");
  }

  // ── Task stats ───────────────────────────────────
  const tasks = data.tasks || [];
  const totalTasks = tasks.length;
  const completedTasks = tasks.filter(t => t.status === "completed").length;
  const inProgressTasks = tasks.filter(t => t.status === "in_progress" || t.status === "in-progress").length;
  $("proj-total").textContent = totalTasks;
  $("proj-completed").textContent = completedTasks;
  $("proj-inprogress").textContent = inProgressTasks;

  // ── Task table with filter + sort ────────────────
  const phaseSelect = $("proj-filter-phase");
  const statusSelect = $("proj-filter-status");

  const uniquePhases = [...new Set(tasks.map(t => t.phase).filter(Boolean))].sort((a, b) => a - b);
  const uniqueStatuses = [...new Set(tasks.map(t => t.status).filter(Boolean))].sort();
  uniquePhases.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = "Phase " + p;
    phaseSelect.appendChild(opt);
  });
  uniqueStatuses.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    statusSelect.appendChild(opt);
  });

  let sortCol = "id";
  let sortAsc = true;

  const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };

  function compareTasks(a, b) {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "priority") {
      va = priorityOrder[va] ?? 99;
      vb = priorityOrder[vb] ?? 99;
    }
    if (va == null) va = "";
    if (vb == null) vb = "";
    let cmp = 0;
    if (typeof va === "number" && typeof vb === "number") cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb), undefined, { numeric: true });
    return sortAsc ? cmp : -cmp;
  }

  function renderTasks() {
    const phaseFilter = phaseSelect.value;
    const statusFilter = statusSelect.value;

    let filtered = tasks.filter(function (t) {
      if (phaseFilter && String(t.phase) !== phaseFilter) return false;
      if (statusFilter && t.status !== statusFilter) return false;
      return true;
    });

    filtered.sort(compareTasks);

    if (filtered.length === 0) {
      $("proj-task-body").innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px;">No tasks match filters</td></tr>';
      return;
    }

    $("proj-task-body").innerHTML = filtered.map(function (t) {
      const priBadge = t.priority === "critical" ? "badge-danger"
        : t.priority === "high" ? "badge-warning"
        : t.priority === "medium" ? "badge-info" : "badge-muted";
      return "<tr>" +
        "<td>" + escHtml(t.id) + "</td>" +
        "<td>" + escHtml(t.title) + "</td>" +
        "<td>" + statusBadge(t.status) + "</td>" +
        "<td>" + (t.phase != null ? escHtml(t.phase) : '<span class="null">—</span>') + "</td>" +
        '<td><span class="badge ' + priBadge + '">' + escHtml(t.priority || "—") + "</span></td>" +
      "</tr>";
    }).join("");
  }

  phaseSelect.addEventListener("change", renderTasks);
  statusSelect.addEventListener("change", renderTasks);

  // Sort headers
  document.querySelectorAll("#proj-task-table .proj-sortable").forEach(function (th) {
    th.addEventListener("click", function () {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }
      document.querySelectorAll("#proj-task-table .proj-sort-arrow").forEach(s => s.textContent = "");
      th.querySelector(".proj-sort-arrow").textContent = sortAsc ? " ▲" : " ▼";
      renderTasks();
    });
  });

  renderTasks();

  // ── Bug summary ──────────────────────────────────
  const bugs = data.bugs || {};
  const sev = bugs.by_severity || {};

  const sevItems = [
    { key: "critical", label: "Critical", cls: "text-red" },
    { key: "high",     label: "High",     cls: "text-amber" },
    { key: "medium",   label: "Medium",   cls: "text-accent" },
    { key: "low",      label: "Low",      cls: "text-muted" },
  ];
  $("proj-bug-sev").innerHTML = sevItems.map(function (s) {
    return '<div class="proj-bug-sev-item">' +
      '<div class="count ' + s.cls + '">' + (sev[s.key] || 0) + '</div>' +
      '<div class="label">' + s.label + '</div>' +
    '</div>';
  }).join("");

  const recent = bugs.recent || [];
  if (recent.length === 0) {
    $("proj-bug-recent").innerHTML = '<div class="text-muted text-xs" style="padding:8px 0;">No recent bugs</div>';
  } else {
    let html = "<table><thead><tr><th>ID</th><th>Title</th><th>Severity</th><th>Status</th></tr></thead><tbody>";
    for (const bug of recent) {
      const sevBadge = bug.severity === "critical" ? "badge-danger"
        : bug.severity === "high" ? "badge-warning"
        : bug.severity === "medium" ? "badge-info" : "badge-muted";
      html += "<tr>" +
        "<td>" + escHtml(bug.id) + "</td>" +
        "<td>" + escHtml(bug.title) + "</td>" +
        '<td><span class="badge ' + sevBadge + '">' + escHtml(bug.severity || "—") + "</span></td>" +
        "<td>" + statusBadge(bug.status) + "</td>" +
      "</tr>";
    }
    html += "</tbody></table>";
    $("proj-bug-recent").innerHTML = html;
  }
};
</script>
