<div class="page-db-explorer">
<style>
.page-db-explorer header{background:#1e293b;padding:10px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #334155;flex-shrink:0}
.page-db-explorer header h1{font-size:14px;color:#38bdf8;font-weight:600}
.page-db-explorer #st{font-size:11px;color:#64748b}
.page-db-explorer .main{display:flex;flex:1;overflow:hidden}
.page-db-explorer .sidebar{width:210px;background:#1e293b;border-right:1px solid #334155;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.page-db-explorer .sidebar h2{font-size:10px;color:#475569;padding:9px 12px 5px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.page-db-explorer .titem{padding:5px 12px;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid #0f172a;font-size:12px;align-items:center}
.page-db-explorer .titem:hover,.page-db-explorer .titem.active{background:#0f172a;color:#38bdf8}
.page-db-explorer .rc{font-size:10px;color:#475569}
.page-db-explorer .content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-db-explorer .tabs{display:flex;background:#1e293b;border-bottom:1px solid #334155;flex-shrink:0}
.page-db-explorer .tab{padding:7px 16px;cursor:pointer;font-size:12px;color:#94a3b8;border-bottom:2px solid transparent;user-select:none}
.page-db-explorer .tab.active{color:#38bdf8;border-bottom-color:#38bdf8}
.page-db-explorer .panel{flex:1;overflow:auto;display:none;flex-direction:column}
.page-db-explorer .panel.active{display:flex}
.page-db-explorer table{width:100%;border-collapse:collapse;font-size:12px}
.page-db-explorer th{background:#1e293b;position:sticky;top:0;padding:5px 10px;text-align:left;color:#94a3b8;font-weight:500;white-space:nowrap;border-bottom:1px solid #334155;z-index:1}
.page-db-explorer td{padding:4px 10px;border-bottom:1px solid #1e293b;white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis;vertical-align:top}
.page-db-explorer tr:hover td{background:#1e293b}
.page-db-explorer .null{color:#334155;font-style:italic}
.page-db-explorer .bt{color:#4ade80}
.page-db-explorer .bf{color:#f87171}
.page-db-explorer .pg{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#1e293b;border-top:1px solid #334155;font-size:11px;color:#64748b;flex-shrink:0}
.page-db-explorer .btn{background:#1e40af;color:#e2e8f0;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px;font-family:monospace}
.page-db-explorer .btn:hover{background:#1d4ed8}
.page-db-explorer .btn:disabled{opacity:.35;cursor:not-allowed}
.page-db-explorer .sc-row{display:grid;grid-template-columns:180px 1fr 90px;gap:0;border-bottom:1px solid #1e293b;padding:5px 10px;font-size:12px;align-items:center}
.page-db-explorer .sc-row:hover{background:#1e293b}
.page-db-explorer .badge{font-size:9px;border-radius:2px;padding:1px 4px;margin-left:4px;vertical-align:middle}
.page-db-explorer .pk{background:#78350f;color:#fde68a}
.page-db-explorer .fk{background:#2e1065;color:#ddd6fe}
.page-db-explorer .nullable{background:#0c4a6e;color:#7dd3fc}
.page-db-explorer .sql-pane{height:100%;display:flex;flex-direction:column}
.page-db-explorer .sql-bar{display:flex;gap:8px;padding:7px 12px;background:#1e293b;border-bottom:1px solid #334155;align-items:center;font-size:11px;color:#64748b;flex-shrink:0;flex-wrap:wrap}
.page-db-explorer textarea{flex:0 0 120px;background:#0f172a;color:#e2e8f0;border:none;border-bottom:1px solid #334155;padding:8px 12px;font-family:monospace;font-size:12px;resize:vertical;outline:none;width:100%;min-height:80px}
.page-db-explorer .qres{flex:1;overflow:auto}
.page-db-explorer .msg{padding:24px;color:#334155;text-align:center;font-size:12px}
.page-db-explorer .err{color:#f87171}
.page-db-explorer .hint{color:#fbbf24;font-size:11px;background:#1c1700;border:1px solid #78350f;border-radius:3px;padding:6px 10px;margin:8px 12px;white-space:pre-wrap;font-family:monospace}
.page-db-explorer .pgcode{color:#94a3b8;font-size:10px}
.page-db-explorer .err-box{background:#1a0505;border:1px solid #7f1d1d;border-radius:3px;padding:8px 12px;margin:8px 12px;color:#f87171;font-family:monospace;font-size:11px;white-space:pre-wrap;text-align:left;cursor:text;user-select:text}
.page-db-explorer .sh{padding:4px 12px;font-size:10px;color:#475569;background:#1e293b;border-bottom:1px solid #334155;flex-shrink:0}
.page-db-explorer .badge-type{font-size:9px;border-radius:2px;padding:1px 4px;margin-left:4px;vertical-align:middle;background:#0c4a6e;color:#7dd3fc}
.page-db-explorer .badge-jsonb{background:#4c1d95;color:#ddd6fe}
.page-db-explorer .badge-text{background:#052e16;color:#86efac}
.page-db-explorer .badge-int{background:#1c1917;color:#d6d3d1}
.page-db-explorer .badge-ts{background:#0c1a2e;color:#93c5fd}
.page-db-explorer .snip-select{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:3px;font-size:11px;padding:2px 6px;cursor:pointer;font-family:monospace}
.page-db-explorer .snip-select option{background:#1e293b;color:#e2e8f0}
</style>

<header>
  <h1>⬡ galdr DB Explorer</h1>
  <span id="db-st">connecting…</span>
  <span style="margin-left:auto;font-size:10px;color:#334155">read-only · SELECT only</span>
</header>
<div class="main">
  <div class="sidebar">
    <h2>Tables</h2>
    <div id="db-tlist" style="overflow-y:auto;flex:1"><div class="msg">…</div></div>
  </div>
  <div class="content">
    <div class="tabs">
      <div class="tab active" onclick="dbShowTab('data')">Data</div>
      <div class="tab" onclick="dbShowTab('schema')">Schema</div>
      <div class="tab" onclick="dbShowTab('sql')">SQL Runner</div>
    </div>
    <div id="db-panel-data" class="panel active"><div class="msg">Select a table from the sidebar</div></div>
    <div id="db-panel-schema" class="panel"><div class="msg">Select a table from the sidebar</div></div>
    <div id="db-panel-sql" class="panel sql-pane">
      <div class="sql-bar">
        <button class="btn" onclick="dbRunQ()">▶ Run (Ctrl+Enter)</button>
        <select class="snip-select" onchange="dbInsertSnippet(this)" title="JSONB query helpers">
          <option value="">📄 JSONB snippets…</option>
          <option value="WHERE {col}::text ~ '{pattern}'">Regex on JSONB column</option>
          <option value="WHERE {col} @> '{&quot;key&quot;:&quot;val&quot;}'::jsonb">Match JSON key/value</option>
          <option value="WHERE {col} ? 'key'">Has JSON key</option>
          <option value="WHERE {col} #>> '{key,nested}' = 'value'">Nested JSON path</option>
          <option value="{col}::text AS {col}_text">Cast JSONB to text</option>
          <option value="jsonb_pretty({col}) AS {col}_pretty">Pretty-print JSONB</option>
          <option value="jsonb_array_length({col})">Array length</option>
          <option value="jsonb_object_keys({col})">List all keys</option>
        </select>
        <span id="db-qmeta"></span>
      </div>
      <textarea id="db-qbox" placeholder="Write a SELECT query…"
        onkeydown="if(event.ctrlKey&&event.key==='Enter'){event.preventDefault();dbRunQ();}"></textarea>
      <div class="qres" id="db-qres"><div class="msg">Write a SELECT query above and press ▶ Run</div></div>
    </div>
  </div>
</div>

<script>
(function() {
'use strict';
let tables=[],active=null,page=1;

async function api(path,opts){
  const r=await fetch(path,opts);
  if(!r.ok){const e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||r.statusText);}
  return r.json();
}

window.dbShowTab = function(n){
  const root=document.querySelector('.page-db-explorer');
  root.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['data','schema','sql'][i]===n));
  root.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='db-panel-'+n));
};

function fmt(v){
  if(v===null||v===undefined)return '<span class="null">NULL</span>';
  if(v===true)return '<span class="bt">true</span>';
  if(v===false)return '<span class="bf">false</span>';
  if(typeof v==='object')return JSON.stringify(v).slice(0,100);
  const s=String(v);return s.length>140?s.slice(0,140)+'…':s;
}

function grid(rows,cols){
  if(!rows.length)return '<div class="msg">No rows</div>';
  const ths=cols.map(c=>'<th>'+c+'</th>').join('');
  const trs=rows.map(r=>'<tr>'+cols.map(c=>'<td>'+fmt(r[c])+'</td>').join('')+'</tr>').join('');
  return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table>';
}

async function loadTables(){
  try{
    const d=await api('/admin/db/tables');
    tables=d.tables;
    document.getElementById('db-st').textContent=d.total+' tables';
    document.getElementById('db-tlist').innerHTML=d.tables.map(t=>
      '<div class="titem" id="db-ti-'+t.table_name+'" onclick="dbSel(\''+t.schema+'\',\''+t.table_name+'\')">'+
        '<span>'+t.table_name+'</span><span class="rc">'+t.estimated_rows.toLocaleString()+'</span>'+
      '</div>').join('');
  }catch(e){document.getElementById('db-st').innerHTML='<span class="err">'+e.message+'</span>';}
}

window.dbSel = function(schema,tname){
  active={schema,tname};page=1;
  document.querySelectorAll('.page-db-explorer .titem').forEach(el=>el.classList.toggle('active',el.id==='db-ti-'+tname));
  const t=tables.find(x=>x.schema===schema&&x.table_name===tname);
  let selectCols='*';
  if(t&&t.columns){
    const cols=t.columns.map(c=>{
      const dt=(c.data_type||'').toLowerCase();
      if(dt==='jsonb'||dt==='json')return '"'+c.name+'"::text AS "'+c.name+'"';
      return '"'+c.name+'"';
    });
    if(cols.some(c=>c.includes('::text')))selectCols=cols.join(', ');
  }
  const qbox=document.getElementById('db-qbox');
  if(qbox)qbox.value='SELECT '+selectCols+'\nFROM '+tname+'\nORDER BY 1 DESC\nLIMIT 20';
  loadData();loadSchema(schema,tname);
};

window.dbInsertSnippet = function(sel){
  if(!sel.value)return;
  const ta=document.getElementById('db-qbox');
  const pos=ta.selectionStart,val=ta.value;
  ta.value=val.slice(0,pos)+' '+sel.value+val.slice(pos);
  ta.focus();ta.selectionStart=ta.selectionEnd=pos+sel.value.length+1;
  sel.value='';
};

async function loadData(){
  if(!active)return;
  const pnl=document.getElementById('db-panel-data');
  pnl.innerHTML='<div class="msg">loading…</div>';
  try{
    const d=await api('/admin/db/tables/'+active.schema+'/'+active.tname+'/data?page='+page+'&page_size=50');
    const nav='<div class="pg">'+
      '<button class="btn" onclick="dbPg(-1)" '+(page===1?'disabled':'')+'>← Prev</button>'+
      '<span>Page '+d.page+' · '+d.total_count.toLocaleString()+' rows total</span>'+
      '<button class="btn" onclick="dbPg(1)" '+(!d.has_more?'disabled':'')+'>Next →</button>'+
    '</div>';
    pnl.innerHTML='<div style="flex:1;overflow:auto">'+grid(d.rows,d.columns)+'</div>'+nav;
  }catch(e){pnl.innerHTML='<div class="msg err">'+e.message+'</div>';}
}

window.dbPg = function(dir){page=Math.max(1,page+dir);loadData();};

function loadSchema(schema,tname){
  const t=tables.find(x=>x.schema===schema&&x.table_name===tname);
  if(!t)return;
  const cols=t.columns.map(c=>{
    const dt=(c.data_type||'').toLowerCase();
    let typeBadge='';
    if(dt==='jsonb'||dt==='json'){
      typeBadge='<span class="badge-type badge-jsonb">'+dt.toUpperCase()+'</span>';
    } else if(dt.includes('text')||dt.includes('varchar')||dt.includes('char')){
      typeBadge='<span class="badge-type badge-text">TEXT</span>';
    } else if(dt.includes('int')||dt.includes('serial')||dt.includes('numeric')||dt.includes('float')){
      typeBadge='<span class="badge-type badge-int">NUM</span>';
    } else if(dt.includes('timestamp')||dt.includes('date')||dt.includes('time')){
      typeBadge='<span class="badge-type badge-ts">TS</span>';
    }
    const b=[
      c.is_primary_key?'<span class="badge pk">PK</span>':'',
      c.is_nullable?'<span class="badge nullable">NULL</span>':'',
      typeBadge,
    ].filter(Boolean).join('');
    return '<div class="sc-row"><span>'+c.name+b+'</span><span style="color:#64748b">'+c.data_type+'</span></div>';
  }).join('');
  const fks=t.foreign_keys.length?'<div class="sh" style="color:#a78bfa">FOREIGN KEYS</div>'+
    t.foreign_keys.map(f=>'<div class="sc-row"><span style="color:#a78bfa">'+f.column+'</span><span style="color:#475569;font-size:10px">→ '+f.references_table+'.'+f.references_column+'</span></div>').join(''):'';
  const ixs=t.indexes.length?'<div class="sh" style="color:#94a3b8">INDEXES</div>'+
    t.indexes.map(ix=>'<div class="sc-row"><span style="color:#94a3b8">'+ix.name+'</span><span style="color:#475569;font-size:10px">'+ix.columns.join(', ')+(ix.is_unique?' · UNIQUE':'')+'</span></div>').join(''):'';
  document.getElementById('db-panel-schema').innerHTML=
    '<div class="sh" style="color:#e2e8f0">'+tname+'</div>'+
    '<div class="sh" style="color:#38bdf8">COLUMNS ('+t.columns.length+')</div>'+cols+fks+ixs;
}

window.dbRunQ = async function(){
  const sql=document.getElementById('db-qbox').value.trim();if(!sql)return;
  const res=document.getElementById('db-qres'),meta=document.getElementById('db-qmeta');
  res.innerHTML='<div class="msg">running…</div>';meta.textContent='';
  try{
    const r=await fetch('/admin/db/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql})});
    const d=await r.json();
    if(!r.ok||d.error){
      let html='<div class="err-box">'+escHtml(d.error||'Query failed')+'</div>';
      if(d.pgcode)html+='<div style="padding:2px 12px 4px"><span class="pgcode">SQLSTATE: '+d.pgcode+'</span></div>';
      if(d.hint)html+='<div class="hint">💡 '+escHtml(d.hint)+'</div>';
      res.innerHTML=html;
      return;
    }
    meta.textContent=d.row_count+' rows · '+d.execution_ms+'ms'+(d.truncated?' (truncated at 1000)':'');
    res.innerHTML=grid(d.rows,d.columns);
  }catch(e){res.innerHTML='<div class="err-box">'+escHtml(e.message)+'</div>';}
};

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

window.pageInit = loadTables;
loadTables();
})();
</script>
</div>
