<div class="page-schedules">
<style>
.page-schedules { padding: 0; display: flex; flex-direction: column; height: 100%; }
.page-schedules .page-header { display: flex; align-items: baseline; gap: 12px; padding: 18px 24px 14px; border-bottom: 1px solid var(--border-subtle); flex-shrink: 0; }
.page-schedules .page-header h1 { font-size: 18px; font-weight: 600; }
.page-schedules .page-header .subtitle { font-size: 12px; color: var(--text-muted); }
.page-schedules .header-actions { margin-left: auto; }
.page-schedules .content-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; }

.page-schedules .type-badge { display: inline-block; padding: 2px 8px; font-size: 10px; font-weight: 600; border-radius: 3px; text-transform: uppercase; letter-spacing: .4px; }
.page-schedules .type-crawl { background: rgba(56, 189, 248, .15); color: var(--accent); }
.page-schedules .type-heartbeat { background: rgba(167, 139, 250, .15); color: var(--accent-purple); }
.page-schedules .type-cleanup { background: rgba(251, 191, 36, .15); color: var(--accent-amber); }

.page-schedules .status-active { background: rgba(74, 222, 128, .15); color: var(--accent-green); }
.page-schedules .status-paused { background: rgba(251, 191, 36, .15); color: var(--accent-amber); }
.page-schedules .status-disabled { background: var(--bg-elevated); color: var(--text-muted); }

.page-schedules .cron-human { display: block; font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.page-schedules .actions-cell { display: flex; gap: 4px; }

.page-schedules .section-title { font-size: 14px; font-weight: 600; margin: 24px 0 12px; color: var(--text-primary); }
.page-schedules .section-title:first-child { margin-top: 0; }

.page-schedules .result-badge { display: inline-block; padding: 2px 8px; font-size: 10px; font-weight: 600; border-radius: 3px; text-transform: uppercase; letter-spacing: .4px; }
.page-schedules .result-success { background: rgba(74, 222, 128, .15); color: var(--accent-green); }
.page-schedules .result-failure { background: rgba(248, 113, 113, .15); color: var(--accent-red); }

/* Modal */
.page-schedules .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: center; justify-content: center; }
.page-schedules .modal { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
.page-schedules .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
.page-schedules .modal-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.page-schedules .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border-subtle); display: flex; justify-content: flex-end; gap: 8px; }
.page-schedules .form-group { display: flex; flex-direction: column; gap: 4px; }
.page-schedules .form-group label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.page-schedules .form-group input,
.page-schedules .form-group select { background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary); padding: 7px 10px; border-radius: var(--radius); font-family: var(--font-mono); font-size: 12px; }
.page-schedules .form-group input:focus,
.page-schedules .form-group select:focus { outline: none; border-color: var(--accent); }
.page-schedules .cron-preview { font-size: 11px; color: var(--accent-purple); min-height: 16px; }
.page-schedules .checkbox-row { display: flex; align-items: center; gap: 8px; }
.page-schedules .checkbox-row input[type="checkbox"] { accent-color: var(--accent); }

/* Toast */
.page-schedules .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg-elevated); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 10px 18px; border-radius: var(--radius); font-size: 12px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.page-schedules .toast.visible { opacity: 1; }
</style>

<div class="page-header">
  <h1>Schedules</h1>
  <span class="subtitle">Cron schedule management</span>
  <div class="header-actions">
    <button class="btn btn-success" onclick="schedOpenModal()">+ Add Schedule</button>
  </div>
</div>

<div class="content-scroll">
  <div class="section-title">Active Schedules</div>
  <div class="card">
    <div id="sched-table"><div class="empty-state"><div class="spinner"></div><span class="text-muted">Loading schedules…</span></div></div>
  </div>

  <div class="section-title">Run History</div>
  <div class="card">
    <div id="sched-history"><div class="empty-state"><div class="spinner"></div><span class="text-muted">Loading history…</span></div></div>
  </div>
  <div id="sched-load-more" class="hidden" style="text-align:center;padding:12px">
    <button class="btn" onclick="schedLoadMore()">Load More</button>
  </div>
</div>

<div id="sched-modal" class="hidden"></div>
<div id="sched-toast" class="toast"></div>

<script>
(function() {
'use strict';

let allSchedules = [];
let historyOffset = 0;
const HISTORY_LIMIT = 20;
let historyTotal = 0;
let editingIndex = -1;

function typeClass(type) {
  const t = (type || '').toLowerCase();
  if (t === 'crawl') return 'type-crawl';
  if (t === 'heartbeat') return 'type-heartbeat';
  return 'type-cleanup';
}

function statusClass(enabled) {
  return enabled ? 'status-active' : 'status-disabled';
}

function statusLabel(enabled) {
  return enabled ? 'active' : 'disabled';
}

function renderSchedules() {
  if (!allSchedules.length) {
    document.getElementById('sched-table').innerHTML =
      '<div class="empty-state"><span class="icon">⏱</span><span>No schedules found</span></div>';
    return;
  }

  let html = '<table><thead><tr>' +
    '<th>Name</th><th>Type</th><th>Schedule</th><th>Last Run</th><th>Next Run</th><th>Status</th><th>Actions</th>' +
    '</tr></thead><tbody>';

  allSchedules.forEach(function(s, i) {
    const cronHuman = formatCron(s.schedule || '');
    const typeCls = typeClass(s.type);
    const stCls = statusClass(s.enabled);
    const stLbl = statusLabel(s.enabled);
    const lastRun = s.last_crawled ? timeAgo(s.last_crawled) : (s.last_run ? timeAgo(s.last_run) : '—');
    const nextRun = s.schedule ? '<span class="text-muted">—</span>' : '—';

    html += '<tr>' +
      '<td>' + escHtml(s.name) + '</td>' +
      '<td><span class="type-badge ' + typeCls + '">' + escHtml(s.type) + '</span></td>' +
      '<td><code>' + escHtml(s.schedule || '—') + '</code><span class="cron-human">' + escHtml(cronHuman) + '</span></td>' +
      '<td>' + lastRun + '</td>' +
      '<td>' + nextRun + '</td>' +
      '<td><span class="type-badge ' + stCls + '">' + stLbl + '</span></td>' +
      '<td><div class="actions-cell">' +
        '<button class="btn btn-sm btn-ghost" onclick="schedToggle(' + i + ')">' + (s.enabled ? '⏸ Pause' : '▶ Resume') + '</button>' +
        '<button class="btn btn-sm btn-ghost" onclick="schedEdit(' + i + ')">✎ Edit</button>' +
        '<button class="btn btn-sm btn-ghost text-red" onclick="schedDelete(' + i + ')">✕</button>' +
      '</div></td>' +
      '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('sched-table').innerHTML = html;
}

function renderHistory(entries, append) {
  const container = document.getElementById('sched-history');
  if (!entries.length && !append) {
    container.innerHTML = '<div class="empty-state"><span class="icon">∅</span><span>No run history</span></div>';
    return;
  }

  let html = '';
  if (!append) {
    html = '<table><thead><tr><th>Time</th><th>Schedule</th><th>Duration</th><th>Result</th></tr></thead><tbody>';
  }

  entries.forEach(function(e) {
    const ts = e.started_at || e.timestamp || '—';
    const name = escHtml(e.routine || '—');
    const dur = e.duration_s != null ? e.duration_s + 's' : (e.duration_ms != null ? Math.round(e.duration_ms / 1000) + 's' : '—');
    const st = (e.status || 'unknown').toLowerCase();
    const rCls = (st === 'completed' || st === 'success') ? 'result-success' : (st === 'failed' || st === 'error') ? 'result-failure' : '';
    html += '<tr>' +
      '<td>' + (ts !== '—' ? timeAgo(ts) : '—') + '</td>' +
      '<td>' + name + '</td>' +
      '<td>' + dur + '</td>' +
      '<td><span class="result-badge ' + rCls + '">' + escHtml(e.status || 'unknown') + '</span></td>' +
      '</tr>';
  });

  if (!append) {
    html += '</tbody></table>';
    container.innerHTML = html;
  } else {
    const tbody = container.querySelector('tbody');
    if (tbody) {
      const tmp = document.createElement('template');
      tmp.innerHTML = html;
      tbody.appendChild(tmp.content);
    }
  }

  const btn = document.getElementById('sched-load-more');
  btn.classList.toggle('hidden', (historyOffset + HISTORY_LIMIT) >= historyTotal);
}

function showToast(msg) {
  const t = document.getElementById('sched-toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(function() { t.classList.remove('visible'); }, 2500);
}

function openModal(title, data) {
  const d = data || {};
  document.getElementById('sched-modal').innerHTML =
    '<div class="modal-backdrop" onclick="schedCloseModal(event)">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
      '<div class="modal-header"><span>' + escHtml(title) + '</span><button class="btn btn-sm btn-ghost" onclick="schedCloseModal()">✕</button></div>' +
      '<div class="modal-body">' +
        '<div class="form-group"><label>Name</label><input id="sched-f-name" value="' + escHtml(d.name || '') + '" placeholder="e.g. nightly-cleanup"></div>' +
        '<div class="form-group"><label>Type</label><select id="sched-f-type">' +
          '<option value="crawl"' + (d.type === 'crawl' ? ' selected' : '') + '>Crawl</option>' +
          '<option value="heartbeat"' + (d.type === 'heartbeat' ? ' selected' : '') + '>Heartbeat</option>' +
          '<option value="cleanup"' + (d.type === 'cleanup' ? ' selected' : '') + '>Cleanup</option>' +
        '</select></div>' +
        '<div class="form-group"><label>Cron Expression</label><input id="sched-f-cron" value="' + escHtml(d.schedule || '') + '" placeholder="0 3 * * *" oninput="schedPreviewCron()"></div>' +
        '<div class="cron-preview" id="sched-cron-preview">' + escHtml(formatCron(d.schedule || '')) + '</div>' +
        '<div class="form-group"><label>Target (optional)</label><input id="sched-f-target" value="' + escHtml(d.target || d.agent || '') + '" placeholder="agent or URL target"></div>' +
        '<div class="form-group"><div class="checkbox-row"><input type="checkbox" id="sched-f-enabled"' + (d.enabled !== false ? ' checked' : '') + '><label style="text-transform:none;font-size:12px">Enabled</label></div></div>' +
      '</div>' +
      '<div class="modal-footer"><button class="btn" onclick="schedCloseModal()">Cancel</button><button class="btn btn-success" onclick="schedSave()">Save</button></div>' +
    '</div></div>';
  document.getElementById('sched-modal').classList.remove('hidden');
}

window.schedPreviewCron = function() {
  const v = document.getElementById('sched-f-cron').value;
  document.getElementById('sched-cron-preview').textContent = formatCron(v);
};

window.schedOpenModal = function() {
  editingIndex = -1;
  openModal('Add Schedule', {});
};

window.schedEdit = function(i) {
  editingIndex = i;
  openModal('Edit Schedule', allSchedules[i]);
};

window.schedCloseModal = function(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('sched-modal').classList.add('hidden');
  document.getElementById('sched-modal').innerHTML = '';
};

window.schedSave = function() {
  const name = document.getElementById('sched-f-name').value.trim();
  if (!name) { showToast('Name is required'); return; }
  const obj = {
    name: name,
    type: document.getElementById('sched-f-type').value,
    schedule: document.getElementById('sched-f-cron').value.trim(),
    target: document.getElementById('sched-f-target').value.trim(),
    enabled: document.getElementById('sched-f-enabled').checked,
  };
  if (editingIndex >= 0) {
    allSchedules[editingIndex] = Object.assign(allSchedules[editingIndex], obj);
  } else {
    allSchedules.push(obj);
  }
  renderSchedules();
  schedCloseModal();
  showToast('Schedule saved');
};

window.schedToggle = function(i) {
  allSchedules[i].enabled = !allSchedules[i].enabled;
  renderSchedules();
  showToast(allSchedules[i].name + (allSchedules[i].enabled ? ' resumed' : ' paused'));
};

window.schedDelete = function(i) {
  const name = allSchedules[i].name;
  allSchedules.splice(i, 1);
  renderSchedules();
  showToast(name + ' deleted');
};

window.schedLoadMore = function() {
  historyOffset += HISTORY_LIMIT;
  loadHistory(true);
};

async function loadHistory(append) {
  try {
    const d = await api('/api/heartbeat/history?limit=' + HISTORY_LIMIT + '&offset=' + historyOffset);
    historyTotal = d.total || 0;
    renderHistory(d.entries || [], append);
  } catch (e) {
    if (!append) {
      document.getElementById('sched-history').innerHTML =
        '<div class="empty-state"><span class="text-red">' + escHtml(e.message) + '</span></div>';
    }
  }
}

async function loadSchedules() {
  allSchedules = [];

  try {
    const routines = await api('/api/heartbeat/routines');
    (routines.routines || []).forEach(function(r) {
      allSchedules.push({
        name: r.name,
        type: 'heartbeat',
        schedule: r.schedule,
        agent: r.agent,
        skill: r.skill,
        enabled: r.enabled !== false,
        last_run: null,
      });
    });
  } catch (e) { /* heartbeat routines unavailable */ }

  try {
    const crawl = await api('/api/status/crawl');
    (crawl.targets || []).forEach(function(t) {
      allSchedules.push({
        name: t.name,
        type: 'crawl',
        schedule: t.schedule || null,
        target: (t.urls || []).join(', '),
        enabled: true,
        last_crawled: t.last_crawled,
        pages: t.indexed_pages,
      });
    });
  } catch (e) { /* crawl targets unavailable */ }

  renderSchedules();
}

async function init() {
  await Promise.all([loadSchedules(), loadHistory(false)]);
}

window.pageInit = init;
init();
})();
</script>
</div>
