<!-- galdr dashboard — system overview -->

<style>
  .dash-health-score {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
    transition: color .3s;
  }
  .dash-health-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .dash-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .dash-crawl-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .dash-crawl-card {
    flex: 1 1 200px;
    max-width: 320px;
    padding: 14px;
    background: var(--bg-base);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
  }
  .dash-crawl-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 6px;
  }
  .dash-crawl-meta {
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }
  .dash-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .dash-severity-row {
    display: flex;
    gap: 12px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .dash-severity-row span { white-space: nowrap; }
</style>

<div class="page-header">
  <h1>Dashboard</h1>
  <span class="subtitle">System overview</span>
</div>

<div style="padding: 20px 24px; display: flex; flex-direction: column; gap: 20px;">

  <!-- Health gauge row -->
  <div class="grid-4" id="dash-gauges">
    <div class="card">
      <div class="card-body stat" id="dash-health">
        <div class="dash-health-score" id="dash-score">—</div>
        <div class="dash-health-row" style="justify-content:center;">
          <span class="status-dot" id="dash-dot"></span>
          <span class="stat-label" id="dash-label" style="margin-top:0;">Loading…</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-body stat">
        <div class="stat-value" id="dash-tasks-val">—</div>
        <div class="stat-label">Tasks</div>
        <div class="dash-progress-label mt-2">
          <span id="dash-tasks-pct">0%</span>
          <span id="dash-tasks-ratio">0 / 0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="dash-tasks-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body stat">
        <div class="stat-value" id="dash-bugs-val">0</div>
        <div class="stat-label">Open Bugs</div>
        <div class="dash-severity-row" id="dash-bugs-sev"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body stat">
        <div class="stat-value" id="dash-hb-status">—</div>
        <div class="stat-label">Heartbeat</div>
        <div class="text-xs text-muted mt-2" id="dash-hb-meta"></div>
      </div>
    </div>
  </div>

  <!-- Crawl freshness -->
  <div class="card">
    <div class="card-header">Crawl Freshness</div>
    <div class="card-body">
      <div class="dash-crawl-grid" id="dash-crawl">
        <div class="empty-state"><span class="icon">⏳</span><span>Loading…</span></div>
      </div>
    </div>
  </div>

  <!-- Recent alerts -->
  <div class="card">
    <div class="card-header">Recent Alerts</div>
    <div class="card-body" id="dash-alerts" style="padding:0;">
      <div class="empty-state"><span class="icon">⏳</span><span>Loading…</span></div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="card">
    <div class="card-header">Quick Actions</div>
    <div class="card-body">
      <div class="dash-actions">
        <button class="btn" id="dash-btn-cleanup">▶ Trigger Nightly Cleanup</button>
        <button class="btn" id="dash-btn-health">⚡ Run Health Check</button>
        <button class="btn" id="dash-btn-tasks">☰ View Tasks</button>
      </div>
    </div>
  </div>

</div>

<script>
window.pageInit = async function () {
  const $  = (id) => document.getElementById(id);

  // Quick action wiring
  $("dash-btn-tasks").onclick = () => navigate("tasks");
  $("dash-btn-cleanup").onclick = async () => {
    $("dash-btn-cleanup").disabled = true;
    $("dash-btn-cleanup").textContent = "Running…";
    try {
      await api("/api/heartbeat/trigger", { method: "POST" });
      $("dash-btn-cleanup").textContent = "✓ Triggered";
    } catch (e) {
      $("dash-btn-cleanup").textContent = "✗ Failed";
    }
    setTimeout(() => {
      $("dash-btn-cleanup").disabled = false;
      $("dash-btn-cleanup").textContent = "▶ Trigger Nightly Cleanup";
    }, 3000);
  };
  $("dash-btn-health").onclick = async () => {
    $("dash-btn-health").disabled = true;
    $("dash-btn-health").textContent = "Checking…";
    try {
      await api("/api/status");
      $("dash-btn-health").textContent = "✓ Healthy";
    } catch (e) {
      $("dash-btn-health").textContent = "✗ Error";
    }
    setTimeout(() => {
      $("dash-btn-health").disabled = false;
      $("dash-btn-health").textContent = "⚡ Run Health Check";
    }, 3000);
  };

  // Fetch data
  let data;
  try {
    data = await api("/api/status");
  } catch (err) {
    $("dash-score").textContent = "!";
    $("dash-label").textContent = "Unreachable";
    $("dash-dot").className = "status-dot critical";
    return;
  }

  // Health score
  const score = data.health_score;
  $("dash-score").textContent = score != null ? score : "?";
  $("dash-score").style.color = healthColor(score);
  $("dash-label").textContent = healthLabel(score);
  const dotClass = score >= 70 ? "healthy" : score >= 40 ? "warning" : "critical";
  $("dash-dot").className = "status-dot " + dotClass;

  // Tasks
  const t = data.tasks || {};
  const total = t.total || 0;
  const completed = t.completed || 0;
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
  $("dash-tasks-val").textContent = total;
  $("dash-tasks-pct").textContent = pct + "%";
  $("dash-tasks-ratio").textContent = completed + " / " + total;
  $("dash-tasks-bar").style.width = pct + "%";

  // Bugs
  const b = data.bugs || {};
  $("dash-bugs-val").textContent = b.open != null ? b.open : b.total || 0;
  const sev = b.by_severity || {};
  const sevParts = [];
  if (sev.critical) sevParts.push('<span class="text-red">' + sev.critical + ' crit</span>');
  if (sev.high) sevParts.push('<span class="text-amber">' + sev.high + ' high</span>');
  if (sev.medium) sevParts.push('<span>' + sev.medium + ' med</span>');
  if (sev.low) sevParts.push('<span class="text-muted">' + sev.low + ' low</span>');
  $("dash-bugs-sev").innerHTML = sevParts.join("") || '<span class="text-muted">No breakdown</span>';

  // Heartbeat
  const hb = data.heartbeat || {};
  if (hb.enabled) {
    $("dash-hb-status").innerHTML = '<span class="text-green">Enabled</span>';
  } else {
    $("dash-hb-status").innerHTML = '<span class="text-muted">Disabled</span>';
  }
  const hbParts = [];
  if (hb.last_run) hbParts.push("Last: " + timeAgo(hb.last_run));
  if (hb.budget_spent != null && hb.budget_limit != null) {
    hbParts.push("Budget: $" + hb.budget_spent.toFixed(2) + " / $" + hb.budget_limit.toFixed(2));
  }
  $("dash-hb-meta").textContent = hbParts.join(" · ") || "No data";

  // Crawl targets
  const targets = (data.crawl && data.crawl.targets) || [];
  if (targets.length === 0) {
    $("dash-crawl").innerHTML = '<div class="empty-state"><span class="icon">∅</span><span>No crawl targets configured</span></div>';
  } else {
    $("dash-crawl").innerHTML = targets.map(function (c) {
      const freshBadge = c.fresh
        ? '<span class="badge badge-success">Fresh</span>'
        : '<span class="badge badge-warning">Stale</span>';
      return '<div class="dash-crawl-card">' +
        '<div class="dash-crawl-name">' + escHtml(c.name) + '</div>' +
        freshBadge +
        '<div class="dash-crawl-meta">' +
          '<span>' + (c.pages || 0) + ' pages</span>' +
          '<span>' + (c.last_crawled ? timeAgo(c.last_crawled) : 'never') + '</span>' +
        '</div>' +
      '</div>';
    }).join("");
  }

  // Alerts
  const alerts = data.alerts || [];
  if (alerts.length === 0) {
    $("dash-alerts").innerHTML = '<div class="empty-state"><span class="icon">✓</span><span>No recent alerts</span></div>';
  } else {
    let html = "<table><thead><tr><th>Type</th><th>Message</th><th>Severity</th></tr></thead><tbody>";
    for (const a of alerts) {
      const sevBadge = a.severity === "critical" || a.severity === "high"
        ? "badge-danger"
        : a.severity === "warning" ? "badge-warning" : "badge-muted";
      html += "<tr>" +
        "<td>" + escHtml(a.type || "—") + "</td>" +
        "<td>" + escHtml(a.message || "") + "</td>" +
        '<td><span class="badge ' + sevBadge + '">' + escHtml(a.severity || "info") + "</span></td>" +
      "</tr>";
    }
    html += "</tbody></table>";
    $("dash-alerts").innerHTML = html;
  }
};
</script>
